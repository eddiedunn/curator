---
# Deploy curator to tela (rootless, user-level Quadlet)
#
# Usage (run on tela as eddie with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e curator_src_dir=<path>
#
# Variables:
#   curator_src_dir: path to checked-out repo on tela

- name: Deploy curator
  hosts: all
  gather_facts: false

  vars:
    service_name: curator
    quadlet_dir: /home/eddie/.config/containers/systemd
    curator_src_dir: "{{ ansible_env.HOME }}/curator"

  tasks:
    - name: Build container image from source
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/curator:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ curator_src_dir }}"
      changed_when: true
      notify: Reload and restart curator

    - name: Copy quadlet container unit file
      ansible.builtin.copy:
        src: "{{ curator_src_dir }}/deploy/curator.container"
        dest: "{{ quadlet_dir }}/curator.container"
        remote_src: true
        mode: "0644"
      notify: Reload and restart curator

  handlers:
    - name: Reload user systemd daemon
      ansible.builtin.command:
        cmd: systemctl --user daemon-reload
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      listen: Reload and restart curator

    - name: Restart curator service
      ansible.builtin.command:
        cmd: systemctl --user restart curator
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      changed_when: true
      listen: Reload and restart curator
